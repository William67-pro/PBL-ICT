<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    text-align:center;
    color:white;
}

/* Card */
.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.4);
    padding:30px;
    border-radius:20px;
    width:320px;
}

/* Image */
img{
    width:200px;
    height:200px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-150px;
    font-size:40px;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{ transform:translateY(0); }
    to{ transform:translateY(-120vh); }
}
</style>
</head>

<body>

<!-- 🎵 Birthday Music -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🎈 Balloons -->
<div class="balloon" style="left:10%; animation-delay:0s;">🎈</div>
<div class="balloon" style="left:30%; animation-delay:2s;">🎈</div>
<div class="balloon" style="left:50%; animation-delay:4s;">🎈</div>
<div class="balloon" style="left:70%; animation-delay:1s;">🎈</div>
<div class="balloon" style="left:90%; animation-delay:3s;">🎈</div>

<!-- 🎂 Birthday Card -->
<div class="card">
    <img src="yourphoto.jpg" alt="Birthday Photo">
    <h1>🎂 Happy Birthday 🎂</h1>
    <p>Wishing you love, happiness, and endless smiles!</p>
</div>

</body>
</html>
